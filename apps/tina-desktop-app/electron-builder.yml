appId: com.tina-chris.desktop
productName: Tina Chris
copyright: Copyright © 2026 Tina Chris contributors

directories:
  # 安装包和解包预览都会输出到桌面应用目录下，避免污染 monorepo 根目录。
  output: release

files:
  # electron-vite 的三端构建产物：main、preload、renderer。
  - out/**
  # 主进程启动时会从 public 读取窗口图标和内置 Live2D 默认模型。
  - public/**
  - package.json
  # main/preload/renderer 已由 electron-vite 打包；生产安装包无需携带 pnpm node_modules。
  - '!node_modules/**'

asar: true
asarUnpack:
  # main 进程需要从真实文件系统读取默认模型、窗口/托盘图标等静态资源。
  # 安装态代码会定位到 resources/app.asar.unpacked/public。
  - public/**

afterPack: build/afterPack.cjs

npmRebuild: false

win:
  icon: public/favicon.ico
  # 当前普通 Windows 权限下，electron-builder 的 winCodeSign 解压会因为 symlink 权限失败。
  # 这里关闭内置签名/资源编辑，再由 build/afterPack.cjs 使用 rcedit 只写入 exe 图标。
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64

nsis:
  installerIcon: public/favicon.ico
  uninstallerIcon: public/favicon.ico
  installerHeaderIcon: public/favicon.ico
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Tina Chris
  deleteAppDataOnUninstall: false

mac:
  target:
    - dmg

linux:
  icon: public/favicon.png
  category: Utility
  target:
    - AppImage
    - deb

artifactName: ${productName}-${version}-${os}-${arch}.${ext}
